name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  quality-and-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Dependency audit (high+)
        run: npm audit --omit=dev --audit-level=high
