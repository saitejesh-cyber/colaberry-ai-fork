<svg width="1400" height="1400" viewBox="0 0 1400 1400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Colaberry AI Podcast brand artwork">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.5" stop-color="#111827"/>
      <stop offset="1" stop-color="#1F2937"/>
    </linearGradient>
    <radialGradient id="orb-coral" cx="28%" cy="22%" r="50%">
      <stop offset="0" stop-color="#4F46E5" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-emerald" cx="75%" cy="72%" r="48%">
      <stop offset="0" stop-color="#0D9488" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#0D9488" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-center" cx="50%" cy="50%" r="36%">
      <stop offset="0" stop-color="#818CF8" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#818CF8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mic-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F9FAFB"/>
      <stop offset="1" stop-color="#D1D5DB"/>
    </linearGradient>
    <linearGradient id="mic-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#818CF8" stop-opacity="0.5"/>
      <stop offset="0.5" stop-color="#4F46E5" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#0D9488" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="wave-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#818CF8" stop-opacity="0.7"/>
      <stop offset="0.5" stop-color="#4F46E5" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0.7"/>
    </linearGradient>
    <pattern id="grid" width="70" height="70" patternUnits="userSpaceOnUse">
      <path d="M70 0H0V70" stroke="#94A3B8" stroke-opacity="0.06" stroke-width="1" fill="none"/>
    </pattern>
    <filter id="blur-lg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="90"/>
    </filter>
    <filter id="blur-sm" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Ambient orbs -->
  <ellipse cx="400" cy="300" rx="600" ry="500" fill="url(#orb-coral)" filter="url(#blur-lg)"/>
  <ellipse cx="1050" cy="1000" rx="550" ry="480" fill="url(#orb-emerald)" filter="url(#blur-lg)"/>
  <ellipse cx="700" cy="700" rx="400" ry="400" fill="url(#orb-center)" filter="url(#blur-lg)"/>

  <!-- Audio waveform bars (left side) -->
  <g stroke="url(#wave-grad)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6">
    <line x1="200" y1="620" x2="200" y2="780"/>
    <line x1="240" y1="580" x2="240" y2="820"/>
    <line x1="280" y1="540" x2="280" y2="860"/>
    <line x1="320" y1="600" x2="320" y2="800"/>
    <line x1="360" y1="650" x2="360" y2="750"/>
    <line x1="400" y1="570" x2="400" y2="830"/>
    <line x1="440" y1="610" x2="440" y2="790"/>
  </g>

  <!-- Audio waveform bars (right side) -->
  <g stroke="url(#wave-grad)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6">
    <line x1="960" y1="610" x2="960" y2="790"/>
    <line x1="1000" y1="570" x2="1000" y2="830"/>
    <line x1="1040" y1="540" x2="1040" y2="860"/>
    <line x1="1080" y1="580" x2="1080" y2="820"/>
    <line x1="1120" y1="620" x2="1120" y2="780"/>
    <line x1="1160" y1="550" x2="1160" y2="850"/>
    <line x1="1200" y1="600" x2="1200" y2="800"/>
  </g>

  <!-- Glow ring behind mic -->
  <circle cx="700" cy="680" r="180" fill="none" stroke="url(#mic-glow)" stroke-width="3" opacity="0.5" filter="url(#blur-sm)"/>
  <circle cx="700" cy="680" r="180" fill="none" stroke="#818CF8" stroke-width="1.5" stroke-opacity="0.2"/>

  <!-- Microphone body -->
  <g transform="translate(700,680)">
    <!-- Mic head (rounded rectangle) -->
    <rect x="-65" y="-140" width="130" height="180" rx="65" fill="url(#mic-body)" opacity="0.95"/>
    <!-- Mic grille lines -->
    <g stroke="#9CA3AF" stroke-width="1.5" stroke-opacity="0.4">
      <line x1="-40" y1="-100" x2="40" y2="-100"/>
      <line x1="-45" y1="-80" x2="45" y2="-80"/>
      <line x1="-48" y1="-60" x2="48" y2="-60"/>
      <line x1="-48" y1="-40" x2="48" y2="-40"/>
      <line x1="-45" y1="-20" x2="45" y2="-20"/>
      <line x1="-40" y1="0" x2="40" y2="0"/>
    </g>
    <!-- Mic cradle arc -->
    <path d="M-85 20 A85 85 0 0 0 85 20" fill="none" stroke="#D1D5DB" stroke-width="5" stroke-linecap="round"/>
    <!-- Mic stand -->
    <line x1="0" y1="75" x2="0" y2="160" stroke="#D1D5DB" stroke-width="5" stroke-linecap="round"/>
    <!-- Mic base -->
    <ellipse cx="0" cy="170" rx="60" ry="12" fill="#9CA3AF" opacity="0.5"/>
  </g>

  <!-- "AI Podcast" heading -->
  <text x="700" y="260" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="120" font-weight="700" fill="#F9FAFB" letter-spacing="-1">AI Podcast</text>

  <!-- "#DailyNews" subheading -->
  <text x="700" y="360" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="64" font-weight="600" fill="#D1D5DB" opacity="0.8">#DailyNews</text>

  <!-- Bottom branding -->
  <text x="700" y="1200" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="52" font-weight="700" fill="#F9FAFB" letter-spacing="1">colaberry<tspan fill="#4F46E5">Ai</tspan></text>
  <text x="700" y="1260" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="32" font-weight="600" fill="#9CA3AF" letter-spacing="2">Research Labs</text>

  <!-- Decorative corner accents -->
  <line x1="60" y1="60" x2="60" y2="140" stroke="#4F46E5" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="60" y1="60" x2="140" y2="60" stroke="#4F46E5" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="1340" y1="60" x2="1340" y2="140" stroke="#0D9488" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="1340" y1="60" x2="1260" y2="60" stroke="#0D9488" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="60" y1="1340" x2="60" y2="1260" stroke="#0D9488" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="60" y1="1340" x2="140" y2="1340" stroke="#0D9488" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="1340" y1="1340" x2="1340" y2="1260" stroke="#4F46E5" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="1340" y1="1340" x2="1260" y2="1340" stroke="#4F46E5" stroke-width="2" stroke-opacity="0.3"/>
</svg>
